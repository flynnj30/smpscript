<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Seek Marketing | Flow Script Studio — NoteForge Edition</title>
    <!-- Favicon - simple chat/flow icon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0f1a'/%3E%3Cpath d='M30 35 L70 35 L70 65 L55 65 L50 75 L45 65 L30 65 Z' fill='%230ff' stroke='%230ff' stroke-width='2'/%3E%3Ccircle cx='45' cy='50' r='3' fill='%230a0f1a'/%3E%3Ccircle cx='55' cy='50' r='3' fill='%230a0f1a'/%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0a0f1a 0%, #0c1220 100%);
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100%;
            position: relative;
        }

        /* Sidebar Styles - Futuristic Dark Theme */
        .sidebar {
            width: 420px;
            background: rgba(18, 25, 40, 0.95);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(0, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            flex-shrink: 0;
            box-shadow: 4px 0 30px rgba(0, 0, 0, 0.5);
            z-index: 20;
            overflow-y: auto;
        }

        .sidebar.collapsed {
            width: 0;
            overflow: hidden;
            border-right: none;
            padding: 0;
        }

        .sidebar-header {
            padding: 1.5rem 1.25rem 0.75rem;
            border-bottom: 1px solid rgba(0, 255, 255, 0.2);
            background: linear-gradient(90deg, rgba(0, 255, 255, 0.05), transparent);
        }

        .sidebar-header h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #0ff;
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 0 5px rgba(0,255,255,0.3);
        }

        .sidebar-header p {
            font-size: 0.7rem;
            color: #8ba0c0;
            margin-top: 6px;
        }

        /* Notes & Scripts Section */
        .notes-section {
            padding: 1rem;
            border-bottom: 1px solid rgba(0, 255, 255, 0.1);
            background: rgba(10, 20, 30, 0.5);
        }

        .notes-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .notes-header h4 {
            font-size: 0.85rem;
            font-weight: 700;
            color: #0ff;
            letter-spacing: 0.3px;
        }

        .add-note-btn {
            background: linear-gradient(135deg, #0ff, #00aaff);
            border: none;
            color: #0a0f1a;
            width: 28px;
            height: 28px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 0 8px rgba(0,255,255,0.5);
        }

        .add-note-btn:hover {
            background: linear-gradient(135deg, #ff44cc, #ff00aa);
            transform: scale(1.02);
            box-shadow: 0 0 12px rgba(255,68,204,0.6);
        }

        .notes-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 320px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .note-card {
            background: rgba(25, 35, 55, 0.8);
            border-radius: 1rem;
            border: 1px solid rgba(0, 255, 255, 0.2);
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            cursor: grab;
            backdrop-filter: blur(4px);
        }
        .note-card:active {
            cursor: grabbing;
        }
        .note-card.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }
        .drag-handle {
            cursor: grab;
            padding: 0 8px;
            font-size: 1rem;
            color: #0ff;
            transition: color 0.1s;
            display: inline-flex;
            align-items: center;
        }
        .drag-handle:active {
            cursor: grabbing;
        }
        .note-title-bar {
            padding: 0.7rem 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            background: rgba(30, 45, 70, 0.6);
            border-radius: 1rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: #ccdeff;
            border-bottom: 1px solid transparent;
        }
        .note-title-left {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
        }

        .note-title-bar:hover {
            background: rgba(0, 255, 255, 0.1);
        }

        .note-title-input {
            font-weight: 600;
            font-size: 0.85rem;
            border: 1px solid #0ff;
            border-radius: 12px;
            padding: 4px 8px;
            width: 70%;
            background: #0a1020;
            color: #0ff;
        }

        .note-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .note-icon-btn {
            background: none;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            padding: 2px 5px;
            border-radius: 20px;
            color: #8ba0c0;
            transition: all 0.1s;
        }

        .note-icon-btn:hover {
            color: #0ff;
            background: rgba(0, 255, 255, 0.2);
        }

        .note-content {
            padding: 0 0.9rem 0.9rem 0.9rem;
            display: none;
            font-size: 0.8rem;
            line-height: 1.55;
            color: #b8c8e8;
            background: rgba(10, 18, 30, 0.8);
            border-top: 1px solid rgba(0, 255, 255, 0.15);
            white-space: pre-wrap;
            word-break: break-word;
        }

        .note-content.show {
            display: block;
        }

        .note-content[contenteditable="true"] {
            background: #1a2a3f;
            outline: 2px solid #0ff;
            border-radius: 12px;
            padding: 12px;
        }

        .empty-notes-message {
            text-align: center;
            padding: 20px;
            color: #5a6e8c;
            font-size: 0.75rem;
            font-style: italic;
        }

        /* Objections List */
        .objections-list {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.9rem;
        }

        .obj-card {
            background: rgba(25, 35, 55, 0.8);
            border-radius: 1rem;
            border: 1px solid rgba(0, 255, 255, 0.2);
            overflow: hidden;
            transition: all 0.2s;
            position: relative;
        }

        .obj-card.pinned {
            border-left: 4px solid #ff44cc;
            background: linear-gradient(90deg, rgba(255,68,204,0.1), rgba(25,35,55,0.8));
            box-shadow: 0 0 15px rgba(255,68,204,0.2);
        }

        .obj-question {
            padding: 0.85rem 1rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: #0ff;
            background: rgba(30, 45, 70, 0.5);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(0, 255, 255, 0.1);
        }

        .obj-answer {
            padding: 0.9rem 1rem;
            font-size: 0.8rem;
            line-height: 1.55;
            color: #b8c8e8;
            background: rgba(10, 20, 35, 0.8);
            display: none;
            border-top: 1px solid rgba(0, 255, 255, 0.1);
            cursor: pointer;
        }

        .obj-answer.show {
            display: block;
        }

        .obj-answer[contenteditable="true"] {
            background: #1a2a3f;
            outline: 2px solid #ff44cc;
        }

        .pin-icon {
            font-size: 1rem;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px 6px;
            border-radius: 20px;
            transition: all 0.1s;
            color: #ff44cc;
        }

        /* Main Area - Dark Futuristic */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: linear-gradient(145deg, #0a0f1a 0%, #0c1220 100%);
        }

        .top-bar {
            background: rgba(10, 20, 35, 0.85);
            backdrop-filter: blur(12px);
            padding: 0.8rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            position: sticky;
            top: 0;
            z-index: 10;
            flex-wrap: wrap;
            gap: 10px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* FUTURISTIC DIGITAL CLOCK */
        .clock-group {
            display: flex;
            gap: 24px;
            background: linear-gradient(135deg, #0a1020, #0c1225);
            padding: 8px 24px;
            border-radius: 60px;
            border: 1px solid rgba(0, 255, 255, 0.4);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2), inset 0 0 10px rgba(0, 255, 255, 0.05);
            margin-left: 16px;
        }
        .clock-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .clock-label {
            font-weight: 700;
            color: #0ff;
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 3px #0ff;
        }
        .clock-time {
            font-weight: 800;
            font-family: 'Orbitron', 'Courier New', monospace;
            background: linear-gradient(135deg, #0ff, #ff44cc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-shadow: 0 0 8px rgba(0,255,255,0.5);
            line-height: 1;
        }
        .clock-ampm {
            font-size: 0.7rem;
            font-weight: 600;
            color: #ff44cc;
            margin-left: 6px;
            text-shadow: 0 0 3px rgba(255,68,204,0.5);
        }

        .menu-toggle {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.4);
            width: 40px;
            height: 40px;
            border-radius: 40px;
            font-size: 1.4rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0ff;
            transition: all 0.2s;
        }
        .menu-toggle:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 10px rgba(0,255,255,0.3);
        }

        .logo-text {
            font-weight: 800;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #0ff, #ff44cc);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            white-space: nowrap;
            text-shadow: 0 0 5px rgba(0,255,255,0.3);
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .icon-btn {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            font-size: 0.85rem;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            color: #0ff;
            transition: all 0.2s;
        }
        .icon-btn:hover {
            background: rgba(0, 255, 255, 0.25);
            box-shadow: 0 0 8px rgba(0,255,255,0.3);
        }

        /* History Dropdown - improved positioning & visibility */
        .version-dropdown {
            position: relative;
            display: inline-block;
        }
        .version-dropdown-btn {
            background: rgba(0, 255, 255, 0.15);
            border: 1px solid rgba(0, 255, 255, 0.5);
            font-size: 0.85rem;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            color: #0ff;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .version-dropdown-btn:hover {
            background: rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 10px rgba(0,255,255,0.4);
        }
        .version-dropdown-content {
            position: absolute;
            top: 110%;
            right: 0;
            background: #0f1825;
            min-width: 340px;
            max-height: 450px;
            overflow-y: auto;
            border-radius: 1rem;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            z-index: 1000;
            display: none;
            border: 1px solid rgba(0, 255, 255, 0.4);
            backdrop-filter: blur(8px);
        }
        .version-dropdown-content.show {
            display: block;
        }
        .version-header-drop {
            padding: 0.8rem 1rem;
            background: #0a1220;
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: #0ff;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .version-list-drop {
            padding: 0.6rem;
        }
        .version-item-drop {
            padding: 12px 14px;
            background: rgba(20, 30, 50, 0.9);
            border-radius: 14px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 1px solid rgba(0, 255, 255, 0.2);
            transition: all 0.15s;
        }
        .version-item-drop:hover {
            background: rgba(0, 255, 255, 0.15);
            border-color: #0ff;
            transform: translateX(3px);
        }
        .version-item-drop strong {
            font-size: 0.75rem;
            color: #0ff;
            display: block;
            margin-bottom: 5px;
        }
        .version-item-drop div:last-child {
            font-size: 0.7rem;
            color: #aac8ff;
        }
        .clear-versions-drop {
            background: rgba(255,68,204,0.2);
            border: 1px solid rgba(255,68,204,0.4);
            font-size: 0.75rem;
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 30px;
            color: #ff88cc;
            transition: all 0.2s;
        }
        .clear-versions-drop:hover {
            background: rgba(255,68,204,0.4);
            color: white;
        }

        /* Flow Styling */
        .flow-wrapper {
            max-width: 950px;
            margin: 1.5rem auto;
            padding: 0 1.5rem 1.5rem;
            width: 100%;
        }

        .flow-container {
            width: 100%;
        }

        .flow-step {
            background: rgba(18, 28, 45, 0.8);
            border-radius: 1.5rem;
            margin-bottom: 1.25rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(0, 255, 255, 0.2);
            backdrop-filter: blur(4px);
        }

        .flow-step.active {
            border-left: 5px solid #0ff;
            box-shadow: 0 0 15px rgba(0,255,255,0.2);
        }

        .step-header {
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 1.5rem;
        }

        .step-badge {
            background: rgba(0, 255, 255, 0.15);
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #0ff;
        }

        .step-title {
            flex: 1;
            font-weight: 700;
            font-size: 1.1rem;
            color: #e0eaff;
        }

        .step-content {
            padding: 0 1.5rem 1.5rem 1.5rem;
            display: none;
        }

        .flow-step.active .step-content {
            display: block;
        }

        .script-card {
            background: rgba(10, 18, 32, 0.9);
            border-radius: 1rem;
            padding: 1.2rem;
            border: 1px solid rgba(0, 255, 255, 0.2);
            font-size: 0.9rem;
            line-height: 1.6;
            color: #c8d8ff;
            margin-bottom: 1rem;
            white-space: pre-wrap;
        }

        .small-btn {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            color: #0ff;
        }
        .small-btn:hover {
            background: rgba(0, 255, 255, 0.2);
        }

        .choice-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin: 8px 0 4px;
        }

        .choice-pill {
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(0, 255, 255, 0.1);
            color: #0ff;
            border: 1px solid rgba(0, 255, 255, 0.3);
        }
        .choice-pill:hover {
            background: rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 8px rgba(0,255,255,0.4);
        }

        .active-category-badge {
            background: rgba(255,68,204,0.2);
            border-radius: 40px;
            padding: 4px 12px;
            font-size: 0.7rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-left: 10px;
            color: #ff44cc;
        }

        .toast-msg {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 255, 255, 0.9);
            color: #0a0f1a;
            padding: 10px 28px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
            z-index: 200;
            box-shadow: 0 0 15px #0ff;
        }

        .nav-footer {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        .nav-footer button {
            flex: 1;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 10px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            color: #0ff;
        }
        .nav-footer button:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 8px rgba(0,255,255,0.3);
        }

        @media (max-width: 800px) {
            .sidebar { width: 280px; }
            .clock-time { font-size: 1.2rem; }
            .clock-group { gap: 12px; padding: 4px 16px; }
            .logo-text { font-size: 0.9rem; }
            .version-dropdown-content { min-width: 280px; right: -20px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="app">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>⚡ Objection Handling Toolkit</h3>
            <p>Pin replies · Drag notes (⋮⋮) up/down · Futuristic Flow</p>
        </div>

        <div class="notes-section">
            <div class="notes-header">
                <h4>📓 Scripts & Notes Library</h4>
                <button class="add-note-btn" id="addNoteBtn" title="Add new note/script">+</button>
            </div>
            <div id="notesListContainer" class="notes-list">
                <div class="empty-notes-message">✨ Click '+' to create a note. Drag using ⋮⋮ to reorder.</div>
            </div>
        </div>

        <div class="objections-list" id="objectionsList"></div>
    </aside>

    <div class="main">
        <div class="top-bar">
            <div class="logo-area">
                <button class="menu-toggle" id="toggleSidebarBtn">☰</button>
                <span class="logo-text">Seek Marketing · Flow Script Studio</span>
                <!-- FUTURISTIC LARGE CLOCK -->
                <div class="clock-group" id="liveClockWidget">
                    <div class="clock-item">
                        <span class="clock-label">🇵🇭 PHT</span>
                        <div><span id="phtTime" class="clock-time">--:--:--</span><span id="phtAmpm" class="clock-ampm">--</span></div>
                    </div>
                    <div class="clock-item">
                        <span class="clock-label">🇬🇧 UK</span>
                        <div><span id="ukTime" class="clock-time">--:--:--</span><span id="ukAmpm" class="clock-ampm">--</span></div>
                    </div>
                </div>
            </div>
            <div class="action-buttons">
                <!-- Save Version button -->
                <button class="icon-btn" id="saveVersionBtn">📸 Save Version</button>
                <!-- HISTORY BUTTON - positioned right before Reset Factory -->
                <div class="version-dropdown" id="versionDropdownContainer">
                    <button class="version-dropdown-btn" id="versionDropdownBtn">
                        📜 History ▼
                    </button>
                    <div class="version-dropdown-content" id="versionDropdownContent">
                        <div class="version-header-drop">
                            <span>📜 Version History</span>
                            <button id="clearVersionsDropdownBtn" class="clear-versions-drop" title="Clear all versions">🗑️ Clear All</button>
                        </div>
                        <div id="versionListDropdown" class="version-list-drop">
                            <div style="text-align:center; padding:20px; color:#5a6e8c;">No versions yet</div>
                        </div>
                    </div>
                </div>
                <!-- Reset Factory button -->
                <button class="icon-btn" id="globalResetBtn">⟳ Reset Factory</button>
            </div>
        </div>

        <div class="flow-wrapper">
            <div id="flowContainer" class="flow-container"></div>
            <div class="nav-footer">
                <button id="prevStepBtn">← Previous Step</button>
                <button id="nextStepBtn">Next Step →</button>
            </div>
        </div>
    </div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
    // ======================= CORE SCRIPT LOGIC (unchanged behavior) =======================
    const ORIGINAL_SCRIPTS = {
        hook: `Hi [Name], it’s Flynn from Seek Marketing Partners. I was having a nosey at your company profile and had a couple of quick questions… Do you have a minute?\n(Pause and listen — let them say yes/no.)\n\n"Awesome, I’ll keep it brief. I noticed a few high-impact opportunities where small tweaks could potentially improve your website traffic and ROI."`,
        qualify: `Just curious — are you currently doing anything online for marketing, like Google Ads, social media ads, or SEO?`,
        value_ppc: `Not sure if this is relevant for you, but we’ve been helping businesses like yours get better results from Google and social media ads while cutting wasted spend.\nOur machine-learning approach helps attract more customers online faster, with less ad budget.`,
        value_seo: `Not sure if this is relevant, but we’ve been helping companies improve search visibility and website traffic while avoiding wasted effort.\nOur data-driven SEO and content strategies bring more visitors and leads organically.`,
        value_nothing: `Even if you’re not running anything at the moment, we’ve been helping businesses spot simple, high-impact ways to get more traffic and leads online — sometimes with very little spend.`,
        close: `What we’ve been doing lately is a quick virtual walkthrough — we show the data and strategies relevant to your business. No obligation, but most people walk away with a couple of ideas they can apply straight away.\nWould you be open to a chat tomorrow around 1 pm?`
    };
    const objectionsLibrary = [
        { id: "obj1", question: "“Not interested / Too busy”", reply: "I completely understand — I'll be super brief. I spotted a couple of quick opportunities that could boost your visibility without much time. If in 60 seconds it's not relevant, feel free to say so — fair?" },
        { id: "obj2", question: "“Is this a sales call?”", reply: "Fair question. I work with Seek Marketing Partners — we help businesses improve online traction. I was genuinely checking your company profile and noticed a few high-impact angles. Happy to share briefly and you decide if it's worth 2 minutes." },
        { id: "obj3", question: "“We already have an agency”", reply: "That's great — having someone handle marketing is smart. The reason I ask is we often find small gaps even with existing partners, like reducing wasted ad spend by 20-30% with machine learning. No obligation, just a quick insight." },
        { id: "obj4", question: "“I don't handle marketing”", reply: "No problem at all — who on your team would be the right person to have a quick chat? Even a 2-min heads-up, I can leave valuable pointers with them." },
        { id: "obj5", question: "“We tried SEO/Ads before, didn't work”", reply: "That's actually common — often it's strategy, not the channel. We use a data-first, machine-learning approach that optimizes for actual conversions, not just clicks. Happy to show a similar business case where we turned around a stalled campaign." },
        { id: "obj6", question: "“Sounds expensive”", reply: "Fair question. We work with businesses at different investment levels — some start with a focused audit to identify quick wins before any major spend. The virtual walkthrough is free and gives you actionable ideas regardless." }
    ];
    const stepsData = [
        { key: "hook", title: "Opening / Hook", badge: "🎯 Start Strong", scriptKey: "hook" },
        { key: "qualify", title: "Qualification", badge: "🔍 Discovery", scriptKey: "qualify", hasChoices: true },
        { key: "value", title: "Value Proposition", badge: "💡 Tailored Solution", scriptKey: "value_ppc", isDynamic: true },
        { key: "close", title: "Soft Close / Appointment", badge: "📅 Next Step", scriptKey: "close" }
    ];
    let currentStepIdx = 0, flowStepsElements = [], pinnedObjections = new Set();
    let qualificationFlags = { "PPC/Ads": false, "SEO only": false, "Nothing/Unsure": false };
    let currentActiveCategory = "PPC/Ads";
    let customValueScripts = {
        "PPC/Ads": ORIGINAL_SCRIPTS.value_ppc,
        "SEO only": ORIGINAL_SCRIPTS.value_seo,
        "Nothing/Unsure": ORIGINAL_SCRIPTS.value_nothing
    };
    let versionHistory = [], notesArray = [];

    function showToast(msg) { const t=document.getElementById('toastMsg'); t.innerText=msg; t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',2000); }
    function persistFullState() {
        const state = { scripts: {}, objections: {}, pinned: Array.from(pinnedObjections), qualificationFlags, currentActiveCategory, customValueScripts, versionHistory, notesArray };
        for (let step of stepsData) { const el = document.getElementById(`script_${step.key}`); if (el) state.scripts[step.key] = el.innerText; }
        for (let obj of objectionsLibrary) { const replyDiv = document.getElementById(`reply_${obj.id}`); if (replyDiv) state.objections[obj.id] = replyDiv.innerText; }
        localStorage.setItem('seekStudioProV3', JSON.stringify(state));
    }
    function loadFullState() {
        const raw = localStorage.getItem('seekStudioProV3');
        if (!raw) return false;
        try {
            const data = JSON.parse(raw);
            if (data.customValueScripts) customValueScripts = data.customValueScripts;
            if (data.currentActiveCategory) currentActiveCategory = data.currentActiveCategory;
            if (data.qualificationFlags) qualificationFlags = data.qualificationFlags;
            if (data.pinned) pinnedObjections = new Set(data.pinned);
            if (data.versionHistory) versionHistory = data.versionHistory;
            if (data.notesArray) notesArray = data.notesArray; else notesArray = [];
            if (data.scripts) for (let [key, txt] of Object.entries(data.scripts)) { const el = document.getElementById(`script_${key}`); if (el && txt) el.innerText = txt; }
            const valueEl = document.getElementById(`script_value`);
            if (valueEl && customValueScripts[currentActiveCategory]) valueEl.innerText = customValueScripts[currentActiveCategory];
            if (data.objections) for (let [id, txt] of Object.entries(data.objections)) { const el = document.getElementById(`reply_${id}`); if (el && txt) el.innerText = txt; }
            updatePinnedUI(); renderVersionHistoryDropdown(); renderNotesUI();
            return true;
        } catch(e) { return false; }
    }
    function updatePinnedUI() { document.querySelectorAll('.obj-card').forEach(card => { const id = card.dataset.objId; if (id && pinnedObjections.has(id)) card.classList.add('pinned'); else card.classList.remove('pinned'); }); }
    function renderVersionHistoryDropdown() {
        const c = document.getElementById('versionListDropdown'); if(!c) return;
        if(!versionHistory.length){ c.innerHTML='<div style="text-align:center; padding:20px; color:#5a6e8c;">✨ No versions saved</div>'; return; }
        c.innerHTML = versionHistory.map(v => `<div class="version-item-drop" data-version-id="${v.id}"><strong>🕒 ${v.timestamp}</strong><div>${v.description}</div></div>`).join('');
        document.querySelectorAll('#versionListDropdown .version-item-drop').forEach(el => { el.addEventListener('click', (e) => { e.stopPropagation(); const id = parseInt(el.dataset.versionId); const ver = versionHistory.find(v=>v.id===id); if(ver) restoreSnapshot(ver); document.getElementById('versionDropdownContent')?.classList.remove('show'); }); });
    }
    function restoreSnapshot(version) { const snap=version.snapshot; if(snap.scripts) for(let [key,text] of Object.entries(snap.scripts)){ const el=document.getElementById(`script_${key}`); if(el) el.innerText=text; } if(snap.customValueScripts) customValueScripts=snap.customValueScripts; if(snap.qualificationFlags) qualificationFlags=snap.qualificationFlags; if(snap.currentActiveCategory) currentActiveCategory=snap.currentActiveCategory; if(snap.objections) for(let [id,text] of Object.entries(snap.objections)){ const el=document.getElementById(`reply_${id}`); if(el) el.innerText=text; } if(snap.notesArray) notesArray=snap.notesArray; const vb=document.getElementById(`script_value`); if(vb&&customValueScripts[currentActiveCategory]) vb.innerText=customValueScripts[currentActiveCategory]; updatePinnedUI(); renderNotesUI(); persistFullState(); showToast(`Restored ${version.timestamp}`); renderVersionHistoryDropdown(); }
    function createVersionSnapshot(desc) { const snapshot={scripts:{},customValueScripts:{...customValueScripts},qualificationFlags:{...qualificationFlags},currentActiveCategory,objections:{},notesArray:JSON.parse(JSON.stringify(notesArray))}; for(let step of stepsData){ const el=document.getElementById(`script_${step.key}`); if(el) snapshot.scripts[step.key]=el.innerText; } for(let obj of objectionsLibrary){ const replyDiv=document.getElementById(`reply_${obj.id}`); if(replyDiv) snapshot.objections[obj.id]=replyDiv.innerText; } versionHistory.unshift({id:Date.now(),timestamp:new Date().toLocaleString(),description:desc,snapshot}); if(versionHistory.length>30) versionHistory.pop(); persistFullState(); renderVersionHistoryDropdown(); showToast(`✅ ${desc}`); }
    
    // Drag & drop and notes functions (original)
    function initDragAndDropNotes() { const container=document.getElementById('notesListContainer'); if(!container) return; let dragSrc=null; container.addEventListener('dragstart',(e)=>{ const card=e.target.closest('.note-card'); if(!card) return; dragSrc=card; e.dataTransfer.effectAllowed='move'; e.dataTransfer.setData('text/plain',card.dataset.noteId); card.classList.add('dragging'); }); container.addEventListener('dragend',(e)=>{ const card=e.target.closest('.note-card'); if(card) card.classList.remove('dragging'); dragSrc=null; }); container.addEventListener('dragover',(e)=>{ e.preventDefault(); e.dataTransfer.dropEffect='move'; }); container.addEventListener('drop',(e)=>{ e.preventDefault(); const targetCard=e.target.closest('.note-card'); if(!targetCard||!dragSrc||dragSrc===targetCard) return; const dragId=parseInt(dragSrc.dataset.noteId), targetId=parseInt(targetCard.dataset.noteId); const dragIndex=notesArray.findIndex(n=>n.id===dragId), targetIndex=notesArray.findIndex(n=>n.id===targetId); if(dragIndex===-1||targetIndex===-1) return; const [movedNote]=notesArray.splice(dragIndex,1); notesArray.splice(targetIndex,0,movedNote); persistFullState(); renderNotesUI(); showToast("📌 Note reordered"); createVersionSnapshot("Reordered note"); }); }
    function saveNote(noteId){ const note=notesArray.find(n=>n.id===noteId); if(!note) return; const titleInput=document.getElementById(`note-title-${noteId}`), contentDiv=document.getElementById(`note-content-${noteId}`); if(titleInput) note.title=titleInput.value.trim()||"Untitled Note"; if(contentDiv) note.content=contentDiv.innerText; persistFullState(); renderNotesUI(); showToast(`💾 Saved`); createVersionSnapshot(`Saved note`); }
    function deleteNote(noteId){ if(confirm("Delete permanently?")){ notesArray=notesArray.filter(n=>n.id!==noteId); persistFullState(); renderNotesUI(); showToast("🗑️ Deleted"); createVersionSnapshot("Deleted note"); } }
    function addNewNote(){ const newId=Date.now(); notesArray.unshift({id:newId,title:"New Script",content:"Paste or type script/note here. Double-click to edit."}); persistFullState(); renderNotesUI(); showToast("✏️ New note added"); createVersionSnapshot("Added note"); }
    function makeNoteContentEditable(element,noteId){ if(element.getAttribute('contenteditable')==='true') return; element.setAttribute('contenteditable','true'); element.focus(); const saveEdit=()=>{ element.setAttribute('contenteditable','false'); const note=notesArray.find(n=>n.id===noteId); if(note){ note.content=element.innerText; persistFullState(); showToast("📝 Saved"); createVersionSnapshot(`Updated note`); } element.removeEventListener('blur',saveEdit); }; element.addEventListener('blur',saveEdit,{once:true}); }
    function renderNotesUI(){ const container=document.getElementById('notesListContainer'); if(!container) return; if(!notesArray.length){ container.innerHTML=`<div class="empty-notes-message">📄 No notes yet. Click '+' to add.</div>`; return; } container.innerHTML=notesArray.map(note=>`<div class="note-card" data-note-id="${note.id}" draggable="true"><div class="note-title-bar" data-expand-id="${note.id}"><div class="note-title-left"><span class="drag-handle" draggable="false" title="Drag to reorder">⋮⋮</span><input type="text" id="note-title-${note.id}" class="note-title-input" value="${escapeHtml(note.title)}" style="background:transparent; border:none; font-weight:600; flex:1; outline:none; color:#0ff;"></div><div class="note-actions"><button class="note-icon-btn save-note-icon" data-note-id="${note.id}" title="Save">💾</button><button class="note-icon-btn delete-note-icon" data-note-id="${note.id}" title="Delete">🗑️</button><span class="expand-icon">▼</span></div></div><div id="note-content-${note.id}" class="note-content" contenteditable="false">${escapeHtml(note.content)}</div></div>`).join('');
        notesArray.forEach(note=>{ const titleBar=document.querySelector(`.note-title-bar[data-expand-id="${note.id}"]`), contentDiv=document.getElementById(`note-content-${note.id}`), saveBtn=document.querySelector(`.save-note-icon[data-note-id="${note.id}"]`), delBtn=document.querySelector(`.delete-note-icon[data-note-id="${note.id}"]`), titleInput=document.getElementById(`note-title-${note.id}`); let expanded=false; if(titleBar) titleBar.addEventListener('click',(e)=>{ if(e.target.classList.contains('save-note-icon')||e.target.classList.contains('delete-note-icon')||e.target===titleInput||e.target.classList.contains('drag-handle')) return; expanded=!expanded; if(contentDiv) contentDiv.classList.toggle('show',expanded); }); if(saveBtn) saveBtn.addEventListener('click',(e)=>{ e.stopPropagation(); saveNote(note.id); }); if(delBtn) delBtn.addEventListener('click',(e)=>{ e.stopPropagation(); deleteNote(note.id); }); if(titleInput) titleInput.addEventListener('change',()=>saveNote(note.id)); if(contentDiv){ contentDiv.addEventListener('dblclick',()=>makeNoteContentEditable(contentDiv,note.id)); if(note.content.trim()!=="") contentDiv.classList.add('show'); } }); initDragAndDropNotes(); }
    function escapeHtml(str){ return str.replace(/[&<>]/g,function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function updateValuePropositionForCategory(category){ currentActiveCategory=category; const vb=document.getElementById(`script_value`); if(vb) vb.innerText=customValueScripts[category]; showToast(`📋 VP: ${category}`); persistFullState(); }
    function handleQualification(choice){ const qb=document.getElementById(`script_qualify`); if(!qb) return; let followUp=""; if(choice==="PPC/Ads") followUp="\n\n👤 Rep: Great. Are you managing that in-house, or working with an agency?\n👤 Rep: Got you. And roughly, monthly ad spend around £1,000 or more?"; else if(choice==="SEO only") followUp="\n\n👤 Rep: Nice. In-house or agency?\n👤 Rep: And roughly, do you invest around £1,000+ per month in SEO?"; else followUp="\n\n👤 Rep: No worries, that actually makes this interesting — there’s usually low-hanging opportunities."; if(!qualificationFlags[choice]){ qb.innerText+=followUp; qualificationFlags[choice]=true; showToast(`✓ Added follow-up for ${choice}`); persistFullState(); } updateValuePropositionForCategory(choice); createVersionSnapshot(`Qualification: ${choice}`); goToStep(2); }
    function makeEditable(element,isValueStep=false){ if(element.getAttribute('contenteditable')==='true') return; element.setAttribute('contenteditable','true'); element.focus(); const onBlur=()=>{ element.setAttribute('contenteditable','false'); if(isValueStep){ customValueScripts[currentActiveCategory]=element.innerText; showToast(`✏️ ${currentActiveCategory} saved`); } else persistFullState(); createVersionSnapshot("Script edited"); element.removeEventListener('blur',onBlur); }; element.addEventListener('blur',onBlur,{once:true}); }
    function renderFlow(){ const container=document.getElementById('flowContainer'); container.innerHTML=''; flowStepsElements=[]; stepsData.forEach((step,idx)=>{ const stepDiv=document.createElement('div'); stepDiv.className='flow-step'; if(idx===currentStepIdx) stepDiv.classList.add('active'); const header=document.createElement('div'); header.className='step-header'; header.innerHTML=`<span class="step-badge">${step.badge}</span><span class="step-title">${step.title}</span><span>▼</span>`; const content=document.createElement('div'); content.className='step-content'; const scriptBox=document.createElement('div'); scriptBox.className='script-card'; scriptBox.id=`script_${step.key}`; scriptBox.setAttribute('contenteditable','false'); if(step.key==='value') scriptBox.innerText=customValueScripts[currentActiveCategory]; else scriptBox.innerText=ORIGINAL_SCRIPTS[step.scriptKey]||""; const btnRow=document.createElement('div'); btnRow.className='inline-buttons'; const editBtn=document.createElement('button'); editBtn.innerText='✏️ Edit Script'; editBtn.className='small-btn'; editBtn.addEventListener('click',(e)=>{ e.stopPropagation(); makeEditable(scriptBox,step.key==='value'); }); btnRow.appendChild(editBtn); if(step.hasChoices){ const choiceGroup=document.createElement('div'); choiceGroup.className='choice-group'; ["PPC/Ads","SEO only","Nothing/Unsure"].forEach(ch=>{ const chip=document.createElement('span'); chip.className='choice-pill'; chip.innerText=ch; chip.addEventListener('click',(e)=>{ e.stopPropagation(); handleQualification(ch); }); choiceGroup.appendChild(chip); }); btnRow.appendChild(choiceGroup); const badgeSpan=document.createElement('span'); badgeSpan.className='active-category-badge'; badgeSpan.id='activeVpBadge'; badgeSpan.innerHTML=`📌 Active: ${currentActiveCategory}`; btnRow.appendChild(badgeSpan); } content.appendChild(scriptBox); content.appendChild(btnRow); stepDiv.appendChild(header); stepDiv.appendChild(content); header.addEventListener('click',()=>goToStep(idx)); container.appendChild(stepDiv); flowStepsElements.push(stepDiv); }); document.querySelectorAll('.script-card').forEach(card=>{ const isValue=card.id==='script_value'; card.addEventListener('dblclick',()=>makeEditable(card,isValue)); }); const badge=document.getElementById('activeVpBadge'); if(badge) badge.innerHTML=`📌 Active: ${currentActiveCategory}`; }
    function renderSidebar(){ const listDiv=document.getElementById('objectionsList'); listDiv.innerHTML=''; objectionsLibrary.forEach(obj=>{ const card=document.createElement('div'); card.className='obj-card'; card.dataset.objId=obj.id; if(pinnedObjections.has(obj.id)) card.classList.add('pinned'); const questionDiv=document.createElement('div'); questionDiv.className='obj-question'; const pinBtn=document.createElement('button'); pinBtn.innerHTML=pinnedObjections.has(obj.id)?'📍':'📌'; pinBtn.className='pin-icon'; pinBtn.addEventListener('click',(e)=>{ e.stopPropagation(); if(pinnedObjections.has(obj.id)) pinnedObjections.delete(obj.id); else pinnedObjections.add(obj.id); updatePinnedUI(); persistFullState(); showToast(pinnedObjections.has(obj.id)?"Pinned":"Unpinned"); }); questionDiv.innerHTML=`<span>${obj.question}</span>`; questionDiv.appendChild(pinBtn); const answerDiv=document.createElement('div'); answerDiv.className='obj-answer'; answerDiv.id=`reply_${obj.id}`; answerDiv.innerText=obj.reply; answerDiv.setAttribute('contenteditable','false'); let expanded=false; questionDiv.addEventListener('click',(e)=>{ if(e.target===pinBtn) return; expanded=!expanded; answerDiv.classList.toggle('show',expanded); }); answerDiv.addEventListener('dblclick',()=>{ if(answerDiv.getAttribute('contenteditable')==='true') return; answerDiv.setAttribute('contenteditable','true'); answerDiv.focus(); answerDiv.addEventListener('blur',()=>{ answerDiv.setAttribute('contenteditable','false'); persistFullState(); showToast('Objection saved'); },{once:true}); }); card.appendChild(questionDiv); card.appendChild(answerDiv); listDiv.appendChild(card); }); }
    function goToStep(index){ if(index<0) index=0; if(index>=stepsData.length) index=stepsData.length-1; currentStepIdx=index; flowStepsElements.forEach((el,i)=>{ if(i===currentStepIdx) el.classList.add('active'); else el.classList.remove('active'); }); }
    function resetToFactory(){ if(confirm("Reset all scripts & notes to factory?")){ for(let step of stepsData){ const el=document.getElementById(`script_${step.key}`); if(el){ if(step.key==='value'){ customValueScripts={"PPC/Ads":ORIGINAL_SCRIPTS.value_ppc,"SEO only":ORIGINAL_SCRIPTS.value_seo,"Nothing/Unsure":ORIGINAL_SCRIPTS.value_nothing}; el.innerText=customValueScripts[currentActiveCategory]; } else el.innerText=ORIGINAL_SCRIPTS[step.scriptKey]; } } for(let obj of objectionsLibrary){ const replyDiv=document.getElementById(`reply_${obj.id}`); if(replyDiv) replyDiv.innerText=obj.reply; } qualificationFlags={"PPC/Ads":false,"SEO only":false,"Nothing/Unsure":false}; pinnedObjections.clear(); currentActiveCategory="PPC/Ads"; notesArray=[]; persistFullState(); renderNotesUI(); updatePinnedUI(); showToast('🏭 Factory reset'); createVersionSnapshot("Factory reset"); } }
    
    function updateClocks() {
        const now = new Date();
        const phtDate = new Date(now.getTime() + (8 * 60 * 60 * 1000));
        let phtHours = phtDate.getUTCHours();
        let phtMinutes = phtDate.getUTCMinutes();
        let phtSeconds = phtDate.getUTCSeconds();
        let phtAmpm = phtHours >= 12 ? 'PM' : 'AM';
        phtHours = phtHours % 12 || 12;
        const phtTimeStr = `${phtHours.toString().padStart(2,'0')}:${phtMinutes.toString().padStart(2,'0')}:${phtSeconds.toString().padStart(2,'0')}`;
        document.getElementById('phtTime').innerText = phtTimeStr;
        document.getElementById('phtAmpm').innerText = phtAmpm;
        
        const ukDate = new Date(now.toLocaleString("en-US", {timeZone: "Europe/London"}));
        let ukHours = ukDate.getHours();
        let ukMinutes = ukDate.getMinutes();
        let ukSeconds = ukDate.getSeconds();
        let ukAmpm = ukHours >= 12 ? 'PM' : 'AM';
        ukHours = ukHours % 12 || 12;
        const ukTimeStr = `${ukHours.toString().padStart(2,'0')}:${ukMinutes.toString().padStart(2,'0')}:${ukSeconds.toString().padStart(2,'0')}`;
        document.getElementById('ukTime').innerText = ukTimeStr;
        document.getElementById('ukAmpm').innerText = ukAmpm;
    }
    setInterval(updateClocks, 1000);
    updateClocks();

    function init(){ renderFlow(); renderSidebar(); loadFullState(); goToStep(0); document.getElementById('toggleSidebarBtn').addEventListener('click',()=>{ document.getElementById('sidebar').classList.toggle('collapsed'); }); document.getElementById('prevStepBtn').addEventListener('click',()=>goToStep(currentStepIdx-1)); document.getElementById('nextStepBtn').addEventListener('click',()=>goToStep(currentStepIdx+1)); document.getElementById('saveVersionBtn').addEventListener('click',()=>createVersionSnapshot("Manual snapshot")); document.getElementById('globalResetBtn').addEventListener('click',resetToFactory); document.getElementById('addNoteBtn').addEventListener('click',addNewNote); const dropdownBtn=document.getElementById('versionDropdownBtn'); const dropdownContent=document.getElementById('versionDropdownContent'); dropdownBtn.addEventListener('click',(e)=>{ e.stopPropagation(); dropdownContent.classList.toggle('show'); }); document.addEventListener('click',(e)=>{ if(!dropdownBtn.contains(e.target)&&!dropdownContent.contains(e.target)) dropdownContent.classList.remove('show'); }); const clearDropdown=document.getElementById('clearVersionsDropdownBtn'); if(clearDropdown) clearDropdown.addEventListener('click',(e)=>{ e.stopPropagation(); if(confirm("Clear all versions?")){ versionHistory=[]; persistFullState(); renderVersionHistoryDropdown(); showToast("Versions cleared"); dropdownContent.classList.remove('show'); } }); window.addEventListener('beforeunload',()=>persistFullState()); }
    init();
</script>
</body>
